    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/telegram.png
    type: select
    proxies: *a2
  - name: 开发服务
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/github.png
    type: select
    proxies: *a2
  - name: 平台与生产力
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/microsoft.png
    type: select
    proxies: *a2
  - name: 下载与静态资源
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/static.png
    type: select
    proxies: *a2
  - name: 游戏服务
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/game.png
    type: select
    proxies: *a2
  - name: 金融加密
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Cryptocurrency_1.png
    type: select
    proxies: *a2
  - name: ZJU
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Bookpedia.png
    type: select
    proxies:
      - DIRECT
      - 选择代理
      - 手动选择
  - name: 自动选择
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Auto.png
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    proxies: &a3
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 低倍率节点
      - 手动选择
      - DIRECT
    interval: 60
    tolerance: 20
  - name: 故障转移
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Available_1.png
    type: fallback
    url: http://cp.cloudflare.com/generate_204
    proxies: *a3
    interval: 60
    tolerance: 20
  - name: 低倍率节点
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Lab.png
    type: url-test
    url: http://cp.cloudflare.com/generate_204
    interval: 60
    tolerance: 20
    include-all: true
    filter: (?i)0\.[0-5]|低倍率|省流|实验性
  - name: 香港节点
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Hong_Kong.png
    type: select
    include-all: true
    filter: 香港|港|\b(?:HK|hk)(?:[-_ ]?\d+(?:[-_ ]?[A-Za-z]{2,})?)?\b|Hong
      Kong|HongKong|hongkong|HONG
      KONG|HONGKONG|深港|HKG|九龙|Kowloon|新界|沙田|荃湾|葵涌|🇭🇰
  - name: 台湾节点
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Taiwan.png
    type: select
    include-all: true
    filter: 台|新北|彰化|\b(?:TW|tw)(?:[-_ ]?\d+(?:[-_
      ]?[A-Za-z]{2,})?)?\b|Taiwan|TAIWAN|TWN|TPE|ROC|🇹🇼|🇼🇸
  - name: 新加坡节点
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Singapore.png
    type: select
    include-all: true
    filter: 新加坡|坡|狮城|\b(?:SG|sg)(?:[-_ ]?\d+(?:[-_
      ]?[A-Za-z]{2,})?)?\b|Singapore|SINGAPORE|SIN|🇸🇬
  - name: 日本节点
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Japan.png
    type: select
    include-all: true
    filter: 日本|川日|东京|大阪|泉日|埼玉|沪日|深日|\b(?:JP|jp)(?:[-_ ]?\d+(?:[-_
      ]?[A-Za-z]{2,})?)?\b|Japan|JAPAN|JPN|NRT|HND|KIX|TYO|OSA|关西|Kansai|KANSAI|🇯🇵
  - name: 美国节点
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/United_States.png
    type: select
    include-all: true
    filter: 美国|美|波特兰|达拉斯|俄勒冈|凤凰城|费利蒙|硅谷|拉斯维加斯|洛杉矶|圣何塞|圣克拉拉|西雅图|芝加哥|纽约|亚特兰大|迈阿密|华盛顿|\b(?:US|us)(?:[-_
      ]?\d+(?:[-_ ]?[A-Za-z]{2,})?)?\b|United States|UnitedStates|UNITED
      STATES|USA|America|AMERICA|JFK|EWR|IAD|ATL|ORD|MIA|NYC|LAX|SFO|SEA|DFW|SJC|🇺🇸
  - name: GLOBAL
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Global.png
    include-all: true
    type: select
    proxies:
      - 选择代理
      - 手动选择
      - 广告拦截
      - 隐私防护
      - AI服务
      - 海外流媒体
      - 香港媒体
      - 台湾媒体
      - 日本媒体
      - 韩国媒体
      - 国内应用
      - 社交通讯
      - 开发服务
      - 平台与生产力
      - 下载与静态资源
      - 游戏服务
      - 金融加密
      - ZJU
      - 自动选择
      - 故障转移
      - 低倍率节点
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - DIRECT
