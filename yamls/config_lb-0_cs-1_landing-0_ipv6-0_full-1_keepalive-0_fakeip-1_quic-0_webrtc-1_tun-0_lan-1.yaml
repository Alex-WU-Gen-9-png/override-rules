mixed-port: 7890
redir-port: 7892
tproxy-port: 7893
routing-mark: 7894
allow-lan: true
bind-address: "*"
ipv6: false
mode: rule
unified-delay: true
tcp-concurrent: true
find-process-mode: off
log-level: info
geodata-loader: standard
external-controller: :9999
external-ui: ui
external-ui-name: xd
external-ui-url: https://github.com/MetaCubeX/metacubexd/archive/refs/heads/gh-pages.zip
disable-keep-alive: true
profile:
  store-selected: true
proxy-groups:
  - name: 选择代理
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Proxy.png
    type: select
    proxies:
      - 自动选择
      - 故障转移
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 低倍率节点
      - 手动选择
      - DIRECT
  - name: 手动选择
    icon: https://cdn.jsdelivr.net/gh/shindgewongxj/WHATSINStash@master/icon/select.png
    include-all: true
    type: select
  - name: 广告拦截
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/adblock.png
    type: select
    proxies: &a1
      - REJECT
      - REJECT-DROP
      - DIRECT
  - name: 隐私防护
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/Lock.png
    type: select
    proxies: *a1
  - name: AI服务
    icon: https://cdn.jsdelivr.net/gh/Koolson/Qure@master/IconSet/Color/ChatGPT.png
    type: select
    proxies: &a2
      - 选择代理
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 低倍率节点
      - 手动选择
      - DIRECT
  - name: 海外流媒体
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/streaming.png
    type: select
    proxies: *a2
  - name: 香港媒体
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/hk.png
    type: select
    proxies:
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
  - name: 台湾媒体
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/tw.png
    type: select
    proxies:
      - 台湾节点
      - 香港节点
      - 日本节点
      - 新加坡节点
      - 美国节点
  - name: 日本媒体
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/jp.png
    type: select
    proxies:
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 香港节点
      - 台湾节点
  - name: 韩国媒体
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/kr.png
    type: select
    proxies:
      - 日本节点
      - 新加坡节点
      - 美国节点
      - 香港节点
      - 台湾节点
  - name: 国内应用
    icon: https://cdn.jsdelivr.net/gh/blackmatrix7/ios_rule_script@master/icon/color/china.png
    type: select
    proxies:
      - DIRECT
      - 选择代理
      - 香港节点
      - 台湾节点
      - 新加坡节点
      - 日本节点
      - 美国节点
      - 低倍率节点
      - 手动选择
