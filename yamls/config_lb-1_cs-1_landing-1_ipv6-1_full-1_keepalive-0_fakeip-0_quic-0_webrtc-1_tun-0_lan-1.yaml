sniffer:
  sniff:
    TLS:
      ports:
        - 443
        - 8443
    HTTP:
      ports:
        - 80
        - 8080-8880
      override-destination: true
    QUIC:
      ports:
        - 443
        - 8443
  override-destination: false
  enable: true
  force-dns-mapping: true
  skip-domain:
    - Mijia Cloud
    - dlg.io.mi.com
    - +.push.apple.com
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: true
  prefer-h3: false
  respect-rules: true
  enhanced-mode: redir-host
  proxy-server-nameserver:
    - tcp://223.5.5.5:53
    - tcp://119.29.29.29:53
  default-nameserver:
    - tcp://223.5.5.5:53
    - tcp://119.29.29.29:53
  nameserver:
    - tcp://1.1.1.1:53
    - tcp://8.8.8.8:53
  fallback:
    - tcp://1.0.0.1:53
    - tcp://8.8.4.4:53
    - tls://1.1.1.1:853
  nameserver-policy:
    +.zju.edu.cn: 10.10.0.21
tun:
  enable: false
  stack: system
  device: Mihomo_Tun
  route-exclude-address:
    - 172.16.0.0/12
    - 100.64.0.0/10
    - 192.168.0.0/16
    - fd00::/8
    - fd7a:115c:a1e0::/48
  dns-hijack:
    - any:53
    - tcp://any:53
    - tls://any:853
  mtu: 1500
  auto-route: true
  auto-detect-interface: true
  strict-route: true
geodata-mode: true
geox-url:
  geoip: https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geoip.dat
  geosite: https://cdn.jsdelivr.net/gh/Loyalsoldier/v2ray-rules-dat@release/geosite.dat
